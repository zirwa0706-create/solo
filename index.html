<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SŌLO</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Ambient background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-text">SŌ<em>LO</em></div>
      </div>

      <div class="category-label">CATEGORIES</div>
      <div class="categories">
        <button class="cat-btn active" data-cat="all">
          <span class="cat-icon">◈</span> All
        </button>
        <button class="cat-btn" data-cat="nasheed">
          <span class="cat-icon">◐</span> Nasheeds
        </button>
        <button class="cat-btn" data-cat="vocals">
          <span class="cat-icon">◉</span> Vocals
        </button>
        <button class="cat-btn" data-cat="quran">
          <span class="cat-icon">◇</span> Quranic
        </button>
        <button class="cat-btn" data-cat="ambience">
          <span class="cat-icon">◌</span> Ambience
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="stat"><span id="total-count">10</span> tracks</div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- HEADER -->
      <div class="top-bar">
        <div class="page-title">Now Playing <em>— SŌLO</em></div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="search" placeholder="Search tracks..." autocomplete="off"/>
        </div>
      </div>

      <!-- PLAYLIST -->
      <div class="playlist-wrap">
        <div class="playlist-header">
          <span>TRACK</span>
          <span>ARTIST</span>
          <span>CATEGORY</span>
          <span>DURATION</span>
        </div>
        <div class="playlist" id="playlist"></div>
      </div>

    </main>
  </div>

  <!-- PLAYER BAR -->
  <div class="player-bar">

    <!-- NOW PLAYING INFO -->
    <div class="now-playing">
      <div class="np-thumb" id="np-thumb">◉</div>
      <div class="np-info">
        <div class="np-title" id="np-title">Select a track</div>
        <div class="np-artist" id="np-artist">—</div>
      </div>
    </div>

    <!-- CONTROLS CENTER -->
    <div class="controls-center">
      <div class="transport">
        <button class="ctrl-btn" id="prev-btn" title="Previous">⏮</button>
        <button class="ctrl-btn play-btn" id="play-btn" title="Play/Pause">▶</button>
        <button class="ctrl-btn" id="next-btn" title="Next">⏭</button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="current-time">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span class="time" id="duration">0:00</span>
      </div>
    </div>

    <!-- VOLUME -->
    <div class="volume-wrap">
      <span class="vol-icon" id="vol-icon">▶</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8"/>
      <span class="vol-pct" id="vol-pct">80%</span>
    </div>

  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
</body>
</html>
